<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Punching Bag - Gesture Workout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/punch.css">
</head>

<body>
    <div class="game-container">
        <!-- Header -->
        <header class="game-header">
            <div class="nav-links">
                <a href="/" class="nav-link">← Dashboard</a>
                <a href="/games" class="nav-link">🎮 Games</a>
            </div>
            <h1>🥊 3D Punching Bag</h1>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span class="status-text">Offline</span>
            </div>
        </header>

        <!-- Controls -->
        <div class="controls-bar">
            <button id="startBtn" class="btn btn-primary">▶ Start</button>
            <button id="stopBtn" class="btn btn-secondary" disabled>■ Stop</button>
            <button id="rebaselineBtn" class="btn btn-warning" disabled>🔄 Baseline</button>
            <label class="toggle-label">
                <input type="checkbox" id="simulateToggle">
                <span>Sim</span>
            </label>
        </div>

        <!-- Game Area -->
        <div class="game-area">
            <!-- 3D Canvas Container -->
            <div id="canvas-container"></div>

            <!-- Health HUD -->
            <div class="health-hud">
                <!-- Enemy Health -->
                <div class="health-bar-container enemy-hp">
                    <span class="hp-label">BOXING BAG</span>
                    <div class="hp-bar-bg">
                        <div class="hp-bar-fill" id="enemyHpBar" style="width: 100%;"></div>
                    </div>
                </div>

                <!-- Feedback Text Center -->
                <div class="center-feedback" id="centerFeedback"></div>

                <!-- Combo Display -->
                <div class="combo-display" id="comboDisplay" style="display: none;">
                    <span class="combo-value" id="comboValue">0</span>
                    <span class="combo-label">COMBO</span>
                    <span class="combo-multiplier" id="comboMultiplier">x1</span>
                </div>

                <!-- Player Health -->
                <div class="health-bar-container player-hp">
                    <div class="hearts-container" id="playerHearts">
                        <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
                    </div>
                    <span class="hp-label">PLAYER</span>
                </div>
            </div>

            <!-- Gesture Indicator -->
            <div class="gesture-indicator" id="gestureIndicator">
                <span class="gesture-icon" id="gestureIcon">✋</span>
                <span class="gesture-name" id="gestureName">-</span>
            </div>

            <!-- Start Overlay -->
            <div class="start-overlay" id="startOverlay">
                <h2>🥊 3D Punching Bag</h2>
                <div class="gesture-legend">
                    <div><span>👊 Tap</span> = PUNCH (Damage)</div>
                    <div><span>🛡️ Hold</span> = BLOCK (Defend Attack)</div>
                    <div><span>👆 Push/Pull</span> = Move Bag</div>
                    <div><span>👋 Wave</span> = Reset Game</div>
                </div>
                <p class="start-hint center-hint">
                    Bag will attack! <br>
                    <span style="color:#ef4444; font-weight:800;">BLOCK</span> when it glows red!
                </p>
                <div class="spinner" id="loadingSpinner" style="display:none"></div>
            </div>

            <!-- Game Over Overlay -->
            <div class="game-over-overlay" id="gameOverOverlay" style="display: none;">
                <h2 id="goTitle">KNOCKOUT!</h2>
                <p id="goMessage">You defeated the bag!</p>
                <button class="btn btn-primary" id="restartBtn">👋 Wave to Restart</button>
            </div>
        </div>

        <!-- Settings -->
        <div class="settings-bar">
            <div class="setting-item">
                <label>Conf:</label>
                <input type="range" id="minConfSlider" min="0.25" max="0.65" step="0.05" value="0.45">
            </div>
            <div class="setting-item">
                <label>Margin:</label>
                <input type="range" id="minMarginSlider" min="0.05" max="0.3" step="0.05" value="0.12">
            </div>
        </div>

        <!-- Debug Panel -->
        <div class="debug-panel" id="debugPanel">
            <span>G: <b id="dbgGesture">-</b></span>
            <span>S: <b id="dbgState">-</b></span>
        </div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <script src="/static/punch.js"></script>
</body>

</html>
