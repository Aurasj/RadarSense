<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Pong - Gesture Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/pong.css">
</head>

<body>
    <div class="game-container">
        <!-- Header -->
        <header class="game-header">
            <div class="nav-links">
                <a href="/" class="nav-link">← Dashboard</a>
                <a href="/games" class="nav-link">🎮 Games</a>
            </div>
            <h1>🏓 Radar Pong</h1>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span class="status-text">Offline</span>
            </div>
        </header>

        <!-- Controls -->
        <div class="controls-bar">
            <button id="startBtn" class="btn btn-primary">▶ Start</button>
            <button id="stopBtn" class="btn btn-secondary" disabled>■ Stop</button>
            <label class="toggle-label">
                <input type="checkbox" id="simulateToggle">
                <span>Sim</span>
            </label>
        </div>

        <!-- Game Area -->
        <div class="game-area">
            <canvas id="gameCanvas"></canvas>

            <!-- Score Display -->
            <div class="score-display">
                <div class="score player-score">
                    <span id="playerScore">0</span>
                    <span class="score-label">YOU</span>
                </div>
                <div class="score-divider">:</div>
                <div class="score bot-score">
                    <span id="botScore">0</span>
                    <span class="score-label">BOT</span>
                </div>
            </div>

            <!-- Gesture Indicator -->
            <div class="gesture-indicator" id="gestureIndicator">
                <span class="gesture-icon" id="gestureIcon">✋</span>
                <span class="gesture-name" id="gestureName">-</span>
            </div>

            <!-- Start Overlay -->
            <div class="start-overlay" id="startOverlay">
                <h2>🏓 Radar Pong</h2>
                <p>Control the paddle with gestures!</p>
                <div class="gesture-legend">
                    <div><span>👆 PUSH</span> = Move LEFT</div>
                    <div><span>👇 PULL</span> = Move RIGHT</div>
                </div>
                <p class="start-hint">Press <b>Start</b> to begin</p>
                <div class="spinner" id="loadingSpinner" style="display:none"></div>
            </div>

            <!-- Game Over Overlay -->
            <div class="game-over-overlay" id="gameOverOverlay" style="display: none;">
                <h2 id="goTitle">GAME OVER</h2>
                <p id="goMessage">First to 5 wins!</p>
                <button class="btn btn-primary" id="restartBtn">Play Again</button>
            </div>
        </div>

        <!-- Debug -->
        <div class="debug-panel" id="debugPanel">
            <span>G: <b id="dbgGesture">-</b></span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <script src="/static/pong.js"></script>
</body>

</html>
